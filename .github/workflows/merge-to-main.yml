name: Merge → Kaggle Submit

on:
  push:
    branches: [main]
    paths:
      - 'onnx_export/**'
      - '.github/config/task_registry.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Package & submit to Kaggle
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          python .github/scripts/kaggle_submit.py \
            --competition "neurogolf-2026" \
            --registry .github/config/task_registry.json \
            --message "auto: $(git log -1 --pretty=%s)"
